# Menus
bindd = SUPER, SPACE, Launch apps, exec, aletheia-launch-walker
bindd = SUPER CTRL, E, Emoji picker, exec, aletheia-launch-walker -m symbols
bindd = SUPER CTRL, C, Capture menu, exec, aletheia-menu capture
bindd = SUPER CTRL, O, Toggle menu, exec, aletheia-menu toggle
bindd = SUPER CTRL, H, Hardware menu, exec, aletheia-menu hardware
bindd = SUPER ALT, SPACE, Aletheia menu, exec, aletheia-menu
bindd = SUPER SHIFT, code:201, Aletheia menu, exec, aletheia-menu
bindd = SUPER, ESCAPE, System menu, exec, aletheia-menu system
bindld = , XF86PowerOff, Power menu, exec, aletheia-menu system
bindd = SUPER, K, Show key bindings, exec, aletheia-menu-keybindings
bindd = , XF86Calculator, Calculator, exec, gnome-calculator

# Aesthetics
bindd = SUPER SHIFT, SPACE, Toggle top bar, exec, aletheia-toggle-waybar
bindd = SUPER CTRL, SPACE, Theme background menu, exec, aletheia-menu background
bindd = SUPER SHIFT CTRL, SPACE, Theme menu, exec, aletheia-menu theme
bindd = SUPER, BACKSPACE, Toggle window transparency, exec, aletheia-hyprland-active-window-transparency-toggle
bindd = SUPER SHIFT, BACKSPACE, Toggle window gaps, exec, aletheia-hyprland-window-gaps-toggle
bindd = SUPER CTRL, BACKSPACE, Toggle single-window square aspect, exec, aletheia-hyprland-window-single-square-aspect-toggle

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, aletheia-toggle-notification-silencing
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Toggles
bindd = SUPER CTRL, I, Toggle locking on idle, exec, aletheia-toggle-idle
bindd = SUPER CTRL, N, Toggle nightlight, exec, aletheia-toggle-nightlight
bindd = SUPER CTRL, Delete, Toggle laptop display, exec, aletheia-hyprland-monitor-internal toggle
bindl = , switch:on:Lid Switch, exec, aletheia-hyprland-monitor-internal off
bindl = , switch:off:Lid Switch, exec, aletheia-hyprland-monitor-internal on

# Control Apple Display brightness
bindd = CTRL, F1, Apple Display brightness down, exec, aletheia-brightness-display-apple -5000
bindd = CTRL, F2, Apple Display brightness up, exec, aletheia-brightness-display-apple +5000
bindd = SHIFT CTRL, F2, Apple Display full brightness, exec, aletheia-brightness-display-apple +60000

# Captures
bindd = , PRINT, Screenshot, exec, aletheia-cmd-screenshot
bindd = ALT, PRINT, Screenrecording, exec, aletheia-menu screenrecord
bindd = SUPER, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# File sharing
bindd = SUPER CTRL, S, Share, exec, aletheia-menu share

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(aletheia-battery-status)"

# Control panels
bindd = SUPER CTRL, A, Audio controls, exec, aletheia-launch-audio
bindd = SUPER CTRL, B, Bluetooth controls, exec, aletheia-launch-bluetooth
bindd = SUPER CTRL, W, Wifi controls, exec, aletheia-launch-wifi
bindd = SUPER CTRL, T, Activity, exec, aletheia-launch-tui btop

# Dictation
bindd = SUPER CTRL, X, Toggle dictation, exec, voxtype record toggle

# Zoom
bindd = SUPER CTRL, Z, Zoom in, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor -j | jq '.float + 1')
bindd = SUPER CTRL ALT, Z, Reset zoom, exec, hyprctl keyword cursor:zoom_factor 1

# Lock system
bindd = SUPER CTRL, L, Lock system, exec, aletheia-lock-screen
